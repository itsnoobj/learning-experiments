<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#FAF7F2"/>
  
  <!-- HD Monogram v6 - Ultra sharp, professional, works as favicon -->
  
  <!-- Rounded square container -->
  <rect x="85" y="60" width="230" height="230" rx="24" fill="#2C2C2C"/>
  
  <!-- H left bar (person 1) -->
  <rect x="125" y="120" width="12" height="130" rx="6" fill="#FAF7F2"/>
  <!-- H right bar (person 2) -->
  <rect x="215" y="120" width="12" height="130" rx="6" fill="#FAF7F2"/>
  
  <!-- Heads -->
  <circle cx="131" cy="105" r="12" fill="#FAF7F2"/>
  <circle cx="221" cy="105" r="12" fill="#FAF7F2"/>
  
  <!-- H crossbar in gold -->
  <rect x="137" y="178" width="78" height="8" rx="4" fill="#B8860B"/>
  
  <!-- D curve in gold -->
  <path d="M227,118 C290,118 290,250 227,250" 
        stroke="#B8860B" stroke-width="10" fill="none" stroke-linecap="round"/>
  
  <!-- Text below -->
  <text x="200" y="340" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="2" fill="#2C2C2C">HUMAN<tspan fill="#B8860B">DYNAMICS</tspan></text>
  <text x="200" y="365" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" letter-spacing="3" fill="#999">.GUIDE</text>
</svg>
