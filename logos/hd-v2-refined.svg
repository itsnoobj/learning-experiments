<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#FAF7F2"/>
  
  <!-- HD Monogram v2 - Refined, sharper, more elegant -->
  
  <!-- Left vertical of H (person 1) - tapered -->
  <path d="M115,90 C115,90 120,88 122,90 L122,260 C122,262 115,262 115,260 Z" fill="#2C2C2C"/>
  <!-- Head of figure 1 -->
  <circle cx="118" cy="74" r="13" fill="#2C2C2C"/>
  
  <!-- Right vertical of H (person 2) - tapered -->
  <path d="M218,90 C218,90 223,88 225,90 L225,260 C225,262 218,262 218,260 Z" fill="#2C2C2C"/>
  <!-- Head of figure 2 -->
  <circle cx="221" cy="74" r="13" fill="#2C2C2C"/>
  
  <!-- H crossbar - the connection/bridge -->
  <rect x="122" y="165" width="96" height="8" rx="4" fill="#B8860B"/>
  
  <!-- D curve - elegant arc representing the dynamic force field -->
  <path d="M225,90 C300,90 320,175 320,175 C320,175 300,260 225,260" 
        stroke="#B8860B" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Energy dots along D curve - representing forces -->
  <circle cx="278" cy="108" r="3.5" fill="#B8860B" opacity="0.7"/>
  <circle cx="302" cy="140" r="3" fill="#B8860B" opacity="0.5"/>
  <circle cx="310" cy="175" r="4" fill="#B8860B" opacity="0.9"/>
  <circle cx="302" cy="210" r="3" fill="#B8860B" opacity="0.5"/>
  <circle cx="278" cy="242" r="3.5" fill="#B8860B" opacity="0.7"/>
  
  <!-- Text -->
  <text x="200" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" letter-spacing="1" fill="#2C2C2C">human<tspan fill="#B8860B">dynamics</tspan></text>
  <text x="200" y="346" text-anchor="middle" font-family="Georgia, serif" font-size="13" letter-spacing="2" fill="#999">.guide</text>
</svg>
