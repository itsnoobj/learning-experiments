<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#FAF7F2"/>
  
  <!-- Connection lines (the forces/dynamics) -->
  <path d="M120,160 C160,120 240,120 280,160" stroke="#B8860B" stroke-width="2.5" fill="none" opacity="0.6"/>
  <path d="M120,160 C140,200 180,240 200,260" stroke="#B8860B" stroke-width="2.5" fill="none" opacity="0.6"/>
  <path d="M280,160 C260,200 220,240 200,260" stroke="#B8860B" stroke-width="2.5" fill="none" opacity="0.6"/>
  <path d="M120,160 C100,200 100,240 140,280" stroke="#B8860B" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M280,160 C300,200 300,240 260,280" stroke="#B8860B" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M140,280 C170,290 230,290 260,280" stroke="#B8860B" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- Human nodes -->
  <circle cx="120" cy="160" r="14" fill="#2C2C2C"/>
  <circle cx="280" cy="160" r="14" fill="#2C2C2C"/>
  <circle cx="200" cy="260" r="14" fill="#2C2C2C"/>
  <circle cx="140" cy="280" r="10" fill="#2C2C2C" opacity="0.6"/>
  <circle cx="260" cy="280" r="10" fill="#2C2C2C" opacity="0.6"/>
  <circle cx="200" cy="130" r="10" fill="#2C2C2C" opacity="0.6"/>
  
  <!-- Pulse rings on main nodes -->
  <circle cx="120" cy="160" r="22" fill="none" stroke="#B8860B" stroke-width="1.5" opacity="0.3"/>
  <circle cx="280" cy="160" r="22" fill="none" stroke="#B8860B" stroke-width="1.5" opacity="0.3"/>
  <circle cx="200" cy="260" r="22" fill="none" stroke="#B8860B" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Text -->
  <text x="200" y="345" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#2C2C2C">human</text>
  <text x="200" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#B8860B">dynamics</text>
</svg>
