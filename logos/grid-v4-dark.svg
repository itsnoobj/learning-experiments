<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#1a1a1a"/>
  
  <!-- 3x3 Grid on dark - Gold + cream cells -->
  <!-- Cell size: 52px, gap: 8px -->
  
  <!-- Row 1 -->
  <rect x="137" y="100" width="52" height="52" rx="6" fill="#FAF7F2"/>
  <rect x="197" y="100" width="52" height="52" rx="6" fill="#B8860B" opacity="0.3"/>
  <rect x="257" y="100" width="52" height="52" rx="6" fill="#B8860B"/>
  
  <!-- Row 2 -->
  <rect x="137" y="160" width="52" height="52" rx="6" fill="#B8860B" opacity="0.5"/>
  <rect x="197" y="160" width="52" height="52" rx="6" fill="#FAF7F2"/>
  <rect x="257" y="160" width="52" height="52" rx="6" fill="#FAF7F2" opacity="0.2"/>
  
  <!-- Row 3 -->
  <rect x="137" y="220" width="52" height="52" rx="6" fill="#FAF7F2" opacity="0.15"/>
  <rect x="197" y="220" width="52" height="52" rx="6" fill="#B8860B"/>
  <rect x="257" y="220" width="52" height="52" rx="6" fill="#FAF7F2"/>
  
  <!-- Wordmark -->
  <text x="223" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#FAF7F2">human<tspan fill="#B8860B">dynamics</tspan></text>
  <text x="223" y="346" text-anchor="middle" font-family="Georgia, serif" font-size="13" letter-spacing="2" fill="#666">.guide</text>
</svg>
