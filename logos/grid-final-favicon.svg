<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Favicon - diagonal insight pattern -->
  <!-- Gold diagonal = the pattern you learn to see -->
  <!-- Faint charcoal = hidden forces -->
  
  <!-- Row 1 -->
  <rect x="4" y="4" width="16" height="16" rx="3" fill="#B8860B"/>
  <rect x="24" y="4" width="16" height="16" rx="3" fill="#2C2C2C" opacity="0.12"/>
  <rect x="44" y="4" width="16" height="16" rx="3" fill="#2C2C2C" opacity="0.18"/>
  
  <!-- Row 2 -->
  <rect x="4" y="24" width="16" height="16" rx="3" fill="#2C2C2C" opacity="0.15"/>
  <rect x="24" y="24" width="16" height="16" rx="3" fill="#B8860B"/>
  <rect x="44" y="24" width="16" height="16" rx="3" fill="#2C2C2C" opacity="0.12"/>
  
  <!-- Row 3 -->
  <rect x="4" y="44" width="16" height="16" rx="3" fill="#2C2C2C" opacity="0.18"/>
  <rect x="24" y="44" width="16" height="16" rx="3" fill="#2C2C2C" opacity="0.1"/>
  <rect x="44" y="44" width="16" height="16" rx="3" fill="#B8860B"/>
</svg>
