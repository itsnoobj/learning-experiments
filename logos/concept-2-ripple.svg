<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#FAF7F2"/>
  
  <!-- Ripple rings -->
  <circle cx="200" cy="170" r="100" fill="none" stroke="#B8860B" stroke-width="1.5" opacity="0.15"/>
  <circle cx="200" cy="170" r="80" fill="none" stroke="#B8860B" stroke-width="2" opacity="0.25"/>
  <circle cx="200" cy="170" r="60" fill="none" stroke="#B8860B" stroke-width="2.5" opacity="0.4"/>
  <circle cx="200" cy="170" r="40" fill="none" stroke="#B8860B" stroke-width="3" opacity="0.6"/>
  
  <!-- Central human figure (abstract) -->
  <!-- Head -->
  <circle cx="200" cy="150" r="12" fill="#2C2C2C"/>
  <!-- Body -->
  <path d="M200,162 L200,195" stroke="#2C2C2C" stroke-width="6" stroke-linecap="round"/>
  <!-- Arms -->
  <path d="M182,178 L218,178" stroke="#2C2C2C" stroke-width="5" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M200,195 L188,218" stroke="#2C2C2C" stroke-width="5" stroke-linecap="round"/>
  <path d="M200,195 L212,218" stroke="#2C2C2C" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="200" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#2C2C2C">human<tspan fill="#B8860B">dynamics</tspan></text>
  <text x="200" y="337" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#888">.guide</text>
</svg>
