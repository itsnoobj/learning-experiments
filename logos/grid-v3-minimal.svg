<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#FAF7F2"/>
  
  <!-- 3x3 Grid - Minimal, more breathing room, fewer strong cells -->
  <!-- Cell size: 48px, gap: 12px -->
  
  <!-- Row 1 -->
  <rect x="140" y="100" width="48" height="48" rx="5" fill="#2C2C2C" opacity="0.12"/>
  <rect x="200" y="100" width="48" height="48" rx="5" fill="#B8860B"/>
  <rect x="260" y="100" width="48" height="48" rx="5" fill="#2C2C2C"/>
  
  <!-- Row 2 -->
  <rect x="140" y="160" width="48" height="48" rx="5" fill="#B8860B"/>
  <rect x="200" y="160" width="48" height="48" rx="5" fill="#2C2C2C" opacity="0.15"/>
  <rect x="260" y="160" width="48" height="48" rx="5" fill="#B8860B" opacity="0.4"/>
  
  <!-- Row 3 -->
  <rect x="140" y="220" width="48" height="48" rx="5" fill="#2C2C2C"/>
  <rect x="200" y="220" width="48" height="48" rx="5" fill="#B8860B" opacity="0.25"/>
  <rect x="260" y="220" width="48" height="48" rx="5" fill="#2C2C2C" opacity="0.12"/>
  
  <!-- Wordmark -->
  <text x="224" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="21" font-weight="bold" fill="#2C2C2C">human<tspan fill="#B8860B">dynamics</tspan></text>
  <text x="224" y="344" text-anchor="middle" font-family="Georgia, serif" font-size="12" letter-spacing="2" fill="#999">.guide</text>
</svg>
