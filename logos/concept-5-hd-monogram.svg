<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#FAF7F2"/>
  
  <!-- HD Monogram - H vertical bars as abstract humans, D curve as the dynamic -->
  
  <!-- Left vertical of H (human figure 1) -->
  <rect x="120" y="100" width="16" height="160" rx="8" fill="#2C2C2C"/>
  <!-- Head of figure 1 -->
  <circle cx="128" cy="85" r="14" fill="#2C2C2C"/>
  
  <!-- Right vertical of H (human figure 2) -->
  <rect x="220" y="100" width="16" height="160" rx="8" fill="#2C2C2C"/>
  <!-- Head of figure 2 -->
  <circle cx="228" cy="85" r="14" fill="#2C2C2C"/>
  
  <!-- H crossbar (connection between humans) -->
  <rect x="136" y="168" width="84" height="10" rx="5" fill="#B8860B"/>
  
  <!-- D curve wrapping around (the dynamic/force) -->
  <path d="M236,95 C310,95 310,265 236,265" stroke="#B8860B" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- Small force dots along the D curve -->
  <circle cx="290" cy="130" r="4" fill="#B8860B" opacity="0.5"/>
  <circle cx="305" cy="180" r="4" fill="#B8860B" opacity="0.5"/>
  <circle cx="290" cy="230" r="4" fill="#B8860B" opacity="0.5"/>
  
  <!-- Text -->
  <text x="200" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2C2C2C">human<tspan fill="#B8860B">dynamics</tspan></text>
  <text x="200" y="358" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#888">.guide</text>
</svg>
