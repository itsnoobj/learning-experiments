<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Dark background -->
  <rect width="400" height="400" fill="#1a1a1a"/>
  
  <!-- 3x3 Grid - Dark mode diagonal insight -->
  <!-- Gold diagonal = insight -->
  <!-- Faint cream = hidden forces -->
  
  <!-- Row 1 -->
  <rect x="135" y="96" width="54" height="54" rx="6" fill="#B8860B"/>
  <rect x="197" y="96" width="54" height="54" rx="6" fill="#FAF7F2" opacity="0.08"/>
  <rect x="259" y="96" width="54" height="54" rx="6" fill="#FAF7F2" opacity="0.12"/>
  
  <!-- Row 2 -->
  <rect x="135" y="158" width="54" height="54" rx="6" fill="#FAF7F2" opacity="0.1"/>
  <rect x="197" y="158" width="54" height="54" rx="6" fill="#B8860B"/>
  <rect x="259" y="158" width="54" height="54" rx="6" fill="#FAF7F2" opacity="0.08"/>
  
  <!-- Row 3 -->
  <rect x="135" y="220" width="54" height="54" rx="6" fill="#FAF7F2" opacity="0.12"/>
  <rect x="197" y="220" width="54" height="54" rx="6" fill="#FAF7F2" opacity="0.08"/>
  <rect x="259" y="220" width="54" height="54" rx="6" fill="#B8860B"/>
  
  <!-- Wordmark -->
  <text x="224" y="325" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#FAF7F2">human<tspan fill="#B8860B">dynamics</tspan></text>
  <text x="224" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="12" letter-spacing="2" fill="#666">.guide</text>
</svg>
