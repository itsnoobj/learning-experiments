<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#FAF7F2"/>
  
  <!-- Two overlapping circles -->
  <circle cx="170" cy="170" r="70" fill="none" stroke="#2C2C2C" stroke-width="3" opacity="0.7"/>
  <circle cx="230" cy="170" r="70" fill="none" stroke="#B8860B" stroke-width="3" opacity="0.7"/>
  
  <!-- Overlap area highlight -->
  <path d="M200,108 A70,70 0 0,1 200,232 A70,70 0 0,1 200,108" fill="#B8860B" opacity="0.12"/>
  
  <!-- Human figure in the overlap (the insight/understanding zone) -->
  <!-- Head -->
  <circle cx="200" cy="148" r="10" fill="#2C2C2C"/>
  <!-- Body -->
  <path d="M200,158 L200,188" stroke="#2C2C2C" stroke-width="5" stroke-linecap="round"/>
  <!-- Arms reaching to both circles -->
  <path d="M180,172 L220,172" stroke="#2C2C2C" stroke-width="4" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M200,188 L190,208" stroke="#2C2C2C" stroke-width="4" stroke-linecap="round"/>
  <path d="M200,188 L210,208" stroke="#2C2C2C" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Labels in circles -->
  <text x="145" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2C2C2C" opacity="0.5">self</text>
  <text x="255" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#B8860B" opacity="0.7">others</text>
  
  <!-- Text -->
  <text x="200" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#2C2C2C">human<tspan fill="#B8860B">dynamics</tspan></text>
  <text x="200" y="327" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#888">.guide</text>
</svg>
