<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#FAF7F2"/>
  
  <!-- HD Monogram v5 - Flowing, organic, dynamic movement -->
  
  <!-- Left figure (H left bar) - slightly angled for dynamism -->
  <path d="M125,88 L125,255" stroke="#2C2C2C" stroke-width="12" stroke-linecap="round"/>
  <!-- Left head -->
  <circle cx="125" cy="72" r="14" fill="#2C2C2C"/>
  
  <!-- Right figure (H right bar) -->
  <path d="M225,88 L225,255" stroke="#2C2C2C" stroke-width="12" stroke-linecap="round"/>
  <!-- Right head -->
  <circle cx="225" cy="72" r="14" fill="#2C2C2C"/>
  
  <!-- Dynamic flowing crossbar - wave instead of straight line -->
  <path d="M137,168 C160,155 190,180 213,168" 
        stroke="#B8860B" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- D curve - flowing, with variable width feel -->
  <path d="M237,88 C270,88 305,120 315,170 C305,220 270,252 237,255" 
        stroke="#B8860B" stroke-width="10" fill="none" stroke-linecap="round"/>
  
  <!-- Small orbital elements showing dynamic energy -->
  <circle cx="290" cy="120" r="4" fill="#B8860B" opacity="0.6"/>
  <circle cx="315" cy="170" r="5" fill="#B8860B" opacity="0.8"/>
  <circle cx="290" cy="222" r="4" fill="#B8860B" opacity="0.6"/>
  
  <!-- Motion lines near the D curve -->
  <path d="M298,130 L305,125" stroke="#B8860B" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M318,165 L325,163" stroke="#B8860B" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M298,215 L305,220" stroke="#B8860B" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="200" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2C2C2C">human<tspan fill="#B8860B">dynamics</tspan></text>
  <text x="200" y="345" text-anchor="middle" font-family="Georgia, serif" font-size="13" letter-spacing="2" fill="#999">.guide</text>
</svg>
